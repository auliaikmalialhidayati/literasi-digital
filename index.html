<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiterasiKuy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(
180deg,
#ffffff 0%,
#eef8ff 30%,
#d6eeff 70%,
#b6dcff 100%
);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* AWAN */
.cloud{
position:absolute;
background:white;
border-radius:100px;
opacity:0.8;
filter:blur(2px);
}

.cloud::before,
.cloud::after{
content:'';
position:absolute;
background:white;
border-radius:50%;
}

.cloud1{
width:180px;
height:60px;
top:80px;
left:-250px;
animation:cloudMove 35s linear infinite;
}

.cloud1::before{
width:80px;
height:80px;
top:-40px;
left:20px;
}

.cloud1::after{
width:100px;
height:100px;
top:-50px;
right:20px;
}

.cloud2{
width:220px;
height:70px;
top:180px;
left:-300px;
animation:cloudMove 50s linear infinite;
animation-delay:5s;
}

.cloud2::before{
width:90px;
height:90px;
top:-40px;
left:30px;
}

.cloud2::after{
width:120px;
height:120px;
top:-55px;
right:25px;
}

.cloud3{
width:150px;
height:50px;
top:300px;
left:-200px;
animation:cloudMove 40s linear infinite;
animation-delay:10s;
}

.cloud3::before{
width:70px;
height:70px;
top:-30px;
left:20px;
}

.cloud3::after{
width:90px;
height:90px;
top:-40px;
right:15px;
}

@keyframes cloudMove{
from{
transform:translateX(0);
}
to{
transform:translateX(1800px);
}
}

/* KONTEN */
.container{
text-align:center;
z-index:2;
animation:fadeIn 2s ease;
}

.logo{
width:280px;
margin-bottom:15px;
animation:floatLogo 4s ease-in-out infinite;
filter:drop-shadow(0 10px 25px rgba(30,58,95,0.2));
}

@keyframes floatLogo{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-15px);
}
}

.title{
font-size:2rem;
font-weight:700;
color:#173b63;
margin-bottom:10px;
}

.subtitle{
font-size:1.3rem;
font-weight:600;
color:#4b6d8f;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
}

.btn{
margin-top:35px;
padding:15px 45px;
border:none;
border-radius:50px;
background:linear-gradient(
135deg,
#2f5d8c,
#6cb6ff
);
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
transition:.4s;
box-shadow:0 10px 25px rgba(47,93,140,.3);
}

.btn:hover{
transform:translateY(-5px) scale(1.05);
box-shadow:0 15px 35px rgba(47,93,140,.5);
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Gelombang bawah */
.wave{
position:absolute;
bottom:0;
left:0;
width:100%;
height:180px;
background:rgba(255,255,255,.35);
border-radius:100% 100% 0 0;
backdrop-filter:blur(10px);
}

</style>
</head>
<body>

<!-- AWAN -->
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>
<div class="cloud cloud3"></div>

<div class="container">

<img src="logo-literasikuy.png" alt="LiterasiKuy" class="logo">

<h1 class="title">LiterasiKuy</h1>

<p class="subtitle">
📚 Scroll E-Book Yuuu!!!! 📖
</p>

<button class="btn" onclick="mulaiBaca()">
Mulai Baca
</button>

</div>

<div class="wave"></div>

<script>

function mulaiBaca(){

document.body.style.opacity="0";

setTimeout(()=>{
window.location.href="home.html";
},800);

}

</script>

</body>
</html>
