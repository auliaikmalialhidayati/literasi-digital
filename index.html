<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255,255,255,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255,255,255,0.1) 0%, transparent 50%);
            z-index: -1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Search Section */
        .search-section {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            display: flex;
            gap: 10px;
            background: rgba(255,255,255,0.95);
            padding: 15px 20px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            flex-wrap: wrap;
            align-items: center;
            min-width: 300px;
        }

        .search-box input {
            border: none;
            outline: none;
            font-size: 1rem;
            flex: 1;
            min-width: 200px;
            background: transparent;
            color: #333;
        }

        .search-box input::placeholder {
            color: #999;
        }

        .search-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .location-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .location-btn:hover {
            background: #764ba2;
            transform: scale(1.05);
        }

        /* Main Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Current Weather Card */
        .weather-card {
            background: rgba(255,255,255,0.95);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            grid-column: 1 / -1;
            position: relative;
            overflow: hidden;
        }

        .weather-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(102, 126, 234, 0.1) 0%, transparent 70%);
            border-radius: 50%;
        }

        .weather-content {
            position: relative;
            z-index: 2;
        }

        .city-name {
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 30px;
            margin: 30px 0;
        }

        .weather-icon {
            font-size: 100px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .temp-info h2 {
            font-size: 4rem;
            color: #667eea;
            font-weight: 700;
            line-height: 1;
        }

        .temp-info p {
            font-size: 1.3rem;
            color: #666;
            margin-top: 10px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            color: #999;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 1.8rem;
            color: #667eea;
            font-weight: 700;
        }

        /* Forecast Cards Grid */
        .forecast-section {
            grid-column: 1 / -1;
        }

        .section-title {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
        }

        .forecast-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transition: 0.3s;
            cursor: pointer;
        }

        .forecast-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .forecast-time {
            color: #999;
            font-size: 0.9rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .forecast-icon {
            font-size: 2.5rem;
            margin: 10px 0;
        }

        .forecast-temp {
            color: #667eea;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .forecast-desc {
            color: #666;
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        /* Hourly Forecast */
        .hourly-section {
            grid-column: 1 / -1;
        }

        .hourly-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 20px;
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .hourly-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .hourly-scroll::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .hourly-scroll::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .hourly-item {
            flex: 0 0 100px;
            text-align: center;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            color: white;
            transition: 0.3s;
        }

        .hourly-item:hover {
            transform: scale(1.08);
        }

        .hourly-time {
            font-size: 0.9rem;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .hourly-icon {
            font-size: 2rem;
            margin: 8px 0;
        }

        .hourly-temp {
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* Additional Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            grid-column: 1 / -1;
        }

        .info-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            border-left: 5px solid #667eea;
            transition: 0.3s;
        }

        .info-card:hover {
            transform: translateX(5px);
        }

        .info-title {
            color: #666;
            font-size: 0.95rem;
            text-transform: uppercase;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .info-value {
            color: #667eea;
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Loading State */
        .loading {
            display: none;
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .loading.active {
            display: block;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error State */
        .error-message {
            display: none;
            grid-column: 1 / -1;
            background: rgba(255,107,107,0.95);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: shake 0.5s;
        }

        .error-message.active {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Recent Searches */
        .recent-searches {
            margin-bottom: 30px;
            animation: slideUp 0.6s ease;
        }

        .recent-title {
            color: white;
            font-size: 1rem;
            margin-bottom: 10px;
            font-weight: 600;
            opacity: 0.9;
        }

        .recent-items {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .recent-item {
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .recent-item:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .weather-card {
                padding: 25px;
            }

            .weather-main {
                flex-direction: column;
                gap: 15px;
            }

            .weather-icon {
                font-size: 60px;
            }

            .temp-info h2 {
                font-size: 3rem;
            }

            .forecast-grid {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }

            .search-box {
                min-width: 100%;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </header>

        <!-- Recent Searches -->
        <div class="recent-searches" id="recentSearches"></div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search" style="color: #667eea; font-size: 1.2rem;"></i>
                <input type="text" id="cityInput" placeholder="Enter city name...">
                <button class="search-btn" onclick="searchWeather()">
                    <i class="fas fa-arrow-right"></i> Search
                </button>
                <button class="location-btn" onclick="getCurrentLocation()">
                    <i class="fas fa-location-dot"></i> Current
                </button>
            </div>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <div class="loading active">
                <div class="loading-spinner"></div>
                <p>Loading weather data...</p>
            </div>
            <div class="error-message" id="errorMessage"></div>
        </div>
    </div>

    <script>
        // Configuration
        const API_KEY = '1a2b3c4d5e6f7g8h'; // Free API - will use Open-Meteo API (no key needed)
        const WEATHER_API_URL = 'https://api.open-meteo.com/v1/forecast';
        const GEOCODING_API_URL = 'https://geocoding-api.open-meteo.com/v1/search';

        // Weather condition icons mapping
        const weatherIcons = {
            0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
            51: '🌧️', 53: '🌧️', 55: '🌧️', 61: '🌧️', 63: '⛈️', 65: '⛈️',
            71: '🌨️', 73: '🌨️', 75: '🌨️', 77: '❄️', 80: '🌧️', 81: '⛈️', 82: '⛈️',
            85: '🌨️', 86: '🌨️', 95: '⛈️', 96: '⛈️', 99: '⛈️'
        };

        // Get weather icon based on code
        function getWeatherIcon(code) {
            return weatherIcons[code] || '🌤️';
        }

        // Format time
        function formatTime(dateString) {
            const date = new Date(dateString);
            return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // Format date
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        // Get wind direction
        function getWindDirection(degree) {
            const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
            return directions[Math.round(degree / 22.5) % 16];
        }

        // Search weather by city name
        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            await getWeatherByCity(city);
        }

        // Get weather by city name
        async function getWeatherByCity(city) {
            try {
                showLoading();
                
                // First, geocode the city name
                const geoResponse = await fetch(`${GEOCODING_API_URL}?name=${encodeURIComponent(city)}&count=1&language=en&format=json`);
                const geoData = await geoResponse.json();

                if (!geoData.results || geoData.results.length === 0) {
                    showError(`City "${city}" not found. Please try another search.`);
                    return;
                }

                const location = geoData.results[0];
                await getWeatherByCoordinates(location.latitude, location.longitude, location.name, location.admin1, location.country);
                
                // Save to recent searches
                saveRecentSearch(`${location.name}, ${location.country}`);
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to fetch weather data. Please try again.');
            }
        }

        // Get weather by coordinates
        async function getWeatherByCoordinates(lat, lon, cityName, admin, country) {
            try {
                showLoading();

                const response = await fetch(
                    `${WEATHER_API_URL}?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,humidity,apparent_temperature&hourly=temperature_2m,weather_code,precipitation&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum&wind_speed_unit=kmh&temperature_unit=celsius&timezone=auto`
                );

                if (!response.ok) {
                    throw new Error('Weather API error');
                }

                const data = await response.json();
                displayWeather(data, cityName, admin, country);
                document.getElementById('cityInput').value = '';
            } catch (error) {
                console.error('Error:', error);
                showError('Failed to fetch weather data. Please try again.');
            }
        }

        // Get current location
        function getCurrentLocation() {
            if (navigator.geolocation) {
                showLoading();
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        getWeatherByCoordinates(latitude, longitude, 'Your Location');
                    },
                    (error) => {
                        showError('Unable to get your location. Please enable location access.');
                        console.error('Geolocation error:', error);
                    }
                );
            } else {
                showError('Geolocation is not supported by your browser.');
            }
        }

        // Display weather data
        function displayWeather(data, cityName, admin, country) {
            const current = data.current;
            const hourly = data.hourly;
            const daily = data.daily;

            const displayName = admin ? `${cityName}, ${admin}, ${country}` : cityName;
            const weatherDesc = getWeatherDescription(current.weather_code);
            
            let html = `
                <!-- Current Weather -->
                <div class="weather-card">
                    <div class="weather-content">
                        <div class="city-name">${displayName}</div>
                        <div class="weather-main">
                            <div class="weather-icon">${getWeatherIcon(current.weather_code)}</div>
                            <div class="temp-info">
                                <h2>${Math.round(current.temperature_2m)}°C</h2>
                                <p>${weatherDesc}</p>
                            </div>
                        </div>
                        <div class="weather-details">
                            <div class="detail-item">
                                <div class="detail-label">Feels Like</div>
                                <div class="detail-value">${Math.round(current.apparent_temperature)}°C</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Humidity</div>
                                <div class="detail-value">${current.humidity}%</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind Speed</div>
                                <div class="detail-value">${Math.round(current.wind_speed_10m)} km/h</div>
                            </div>
                            <div class="detail-item">
                                <div class="detail-label">Wind Direction</div>
                                <div class="detail-value">${getWindDirection(current.wind_direction_10m)}</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 5-Day Forecast -->
                <div class="forecast-section">
                    <div class="section-title">
                        <i class="fas fa-calendar-days"></i> 5-Day Forecast
                    </div>
                    <div class="forecast-grid">
            `;

            for (let i = 0; i < daily.time.length; i++) {
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);
                const code = daily.weather_code[i];
                const date = formatDate(daily.time[i]);

                html += `
                    <div class="forecast-card">
                        <div class="forecast-time">${date}</div>
                        <div class="forecast-icon">${getWeatherIcon(code)}</div>
                        <div class="forecast-temp">${maxTemp}°</div>
                        <div style="color: #999; font-size: 0.9rem;">${minTemp}°</div>
                        <div class="forecast-desc">${getWeatherDescription(code)}</div>
                    </div>
                `;
            }

            html += `</div></div>`;

            // Hourly Forecast
            html += `
                <div class="hourly-section">
                    <div class="section-title">
                        <i class="fas fa-clock"></i> Hourly Forecast (24 Hours)
                    </div>
                    <div class="hourly-scroll">
            `;

            for (let i = 0; i < Math.min(24, hourly.time.length); i++) {
                const time = formatTime(hourly.time[i]);
                const temp = Math.round(hourly.temperature_2m[i]);
                const code = hourly.weather_code[i];

                html += `
                    <div class="hourly-item">
                        <div class="hourly-time">${time}</div>
                        <div class="hourly-icon">${getWeatherIcon(code)}</div>
                        <div class="hourly-temp">${temp}°C</div>
                    </div>
                `;
            }

            html += `</div></div>`;

            // Additional Info
            html += `
                <div class="info-grid">
                    <div class="info-card">
                        <div class="info-title">Max Temperature</div>
                        <div class="info-value">
                            <i class="fas fa-thermometer-full" style="color: #ff6b6b;"></i>
                            ${Math.round(daily.temperature_2m_max[0])}°C
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-title">Min Temperature</div>
                        <div class="info-value">
                            <i class="fas fa-thermometer-empty" style="color: #4ecdc4;"></i>
                            ${Math.round(daily.temperature_2m_min[0])}°C
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-title">Precipitation</div>
                        <div class="info-value">
                            <i class="fas fa-droplet" style="color: #667eea;"></i>
                            ${daily.precipitation_sum[0] || 0} mm
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-title">Wind Gust</div>
                        <div class="info-value">
                            <i class="fas fa-wind" style="color: #f0ad4e;"></i>
                            ${Math.round(current.wind_speed_10m)} km/h
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('dashboard').innerHTML = html;
            hideLoading();
            hideError();
        }

        // Get weather description based on code
        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Foggy',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with hail',
                99: 'Thunderstorm with hail'
            };
            return descriptions[code] || 'Unknown';
        }

        // Show loading state
        function showLoading() {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `
                <div class="loading active">
                    <div class="loading-spinner"></div>
                    <p>Loading weather data...</p>
                </div>
            `;
        }

        // Hide loading state
        function hideLoading() {
            const loading = document.querySelector('.loading');
            if (loading) loading.classList.remove('active');
        }

        // Show error message
        function showError(message) {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `
                <div class="error-message active">
                    <i class="fas fa-exclamation-circle" style="margin-right: 10px;"></i>
                    ${message}
                </div>
            `;
            hideLoading();
        }

        // Hide error message
        function hideError() {
            const errorMsg = document.getElementById('errorMessage');
            if (errorMsg) errorMsg.classList.remove('active');
        }

        // Save recent search
        function saveRecentSearch(city) {
            let recent = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            recent = recent.filter(c => c !== city);
            recent.unshift(city);
            recent = recent.slice(0, 5);
            localStorage.setItem('recentSearches', JSON.stringify(recent));
            displayRecentSearches();
        }

        // Display recent searches
        function displayRecentSearches() {
            const recent = JSON.parse(localStorage.getItem('recentSearches') || '[]');
            const container = document.getElementById('recentSearches');
            
            if (recent.length === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '<div class="recent-title"><i class="fas fa-history"></i> Recent Searches</div><div class="recent-items">';
            recent.forEach(city => {
                html += `<div class="recent-item" onclick="getWeatherByCity('${city.split(',')[0]}')">${city}</div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Enter key search
        document.getElementById('cityInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchWeather();
            }
        });

        // Initialize
        displayRecentSearches();
        
        // Load default city on load
        window.addEventListener('load', () => {
            getWeatherByCity('New York');
        });
    </script>
</body>
</html>
